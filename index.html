<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penguins Rule | penguinsrule.world</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
min-height: 100%;
background: #050a10;
color: #f0f4f8;
font-family: ‘Crimson Text’, serif;
overflow-x: hidden;
}

.page {
min-height: 100vh;
background:
radial-gradient(ellipse 100% 50% at 50% 100%, #0d2d4a 0%, transparent 70%),
radial-gradient(ellipse 60% 30% at 20% 85%, #0a3020 0%, transparent 60%),
radial-gradient(ellipse 50% 25% at 80% 90%, #1a1a3a 0%, transparent 60%),
#050a10;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 50px 20px;
gap: 0;
text-align: center;
}

/* ── Decree ── */
.decree {
font-family: ‘Cinzel’, serif;
font-size: clamp(0.55rem, 1.2vw, 0.8rem);
letter-spacing: 0.5em;
text-transform: uppercase;
color: #a8d8f0;
opacity: 0.75;
margin-bottom: 16px;
}

/* ── Gold divider ── */
.divider {
width: 200px;
height: 1px;
background: linear-gradient(90deg, transparent, #c9a84c, transparent);
margin: 0 auto 24px;
}

/* ── Penguin ── */
.penguin-wrap {
margin-bottom: 28px;
}

.penguin-svg {
width: clamp(180px, 30vw, 250px);
filter: drop-shadow(0 0 24px rgba(168,216,240,0.25));
}

/* ── Titles ── */
.main-title {
font-family: ‘Cinzel Decorative’, serif;
font-size: clamp(2.4rem, 8vw, 5.5rem);
font-weight: 900;
line-height: 1;
color: #c9a84c;
margin-bottom: 8px;
}

.subtitle-rule {
font-family: ‘Cinzel Decorative’, serif;
font-size: clamp(1.2rem, 4vw, 2.6rem);
font-weight: 900;
color: #a8d8f0;
letter-spacing: 0.1em;
margin-bottom: 28px;
text-shadow: 0 0 20px rgba(168,216,240,0.4);
}

/* ── Haiku ── */
.haiku {
font-style: italic;
font-size: clamp(1rem, 2.5vw, 1.25rem);
line-height: 2;
color: rgba(240,244,248,0.75);
margin-bottom: 28px;
}

.haiku span {
color: #f0cc6a;
font-style: normal;
}

/* ── Shurikens ── */
.stars-row {
display: flex;
gap: 20px;
align-items: center;
justify-content: center;
margin-bottom: 28px;
}

.shuriken {
width: 24px;
height: 24px;
fill: #c9a84c;
opacity: 0.85;
animation: spin 8s linear infinite;
flex-shrink: 0;
}
.shuriken:nth-child(2) { animation-duration: 5s; animation-direction: reverse; }
.shuriken:nth-child(3) { animation-duration: 11s; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Stats ── */
.stats {
display: flex;
border: 1px solid rgba(168,216,240,0.2);
overflow: hidden;
max-width: 520px;
width: 100%;
margin-bottom: 36px;
}

.stat {
flex: 1;
background: rgba(5,10,16,0.85);
padding: 20px 10px;
border-right: 1px solid rgba(168,216,240,0.1);
}
.stat:last-child { border-right: none; }

.stat-number {
font-family: ‘Cinzel’, serif;
font-size: clamp(1.6rem, 4vw, 2.4rem);
color: #f0cc6a;
font-weight: 700;
display: block;
line-height: 1;
margin-bottom: 6px;
}

.stat-label {
font-size: 0.6rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: #a8d8f0;
opacity: 0.6;
display: block;
}

/* ── Motto ── */
.motto {
font-family: ‘Cinzel’, serif;
font-size: clamp(0.55rem, 1.3vw, 0.75rem);
letter-spacing: 0.4em;
text-transform: uppercase;
color: rgba(168,216,240,0.35);
}
</style>

</head>
<body>
<div class="page">

  <div class="decree">Ancient Order of the Antarctic Brotherhood</div>
  <div class="divider"></div>

  <div class="penguin-wrap">
    <svg class="penguin-svg" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="90" rx="42" ry="45" fill="#0a0a0a"/>
      <ellipse cx="100" cy="98" rx="28" ry="30" fill="#e8e8e8"/>
      <rect x="72" y="72" width="56" height="28" rx="6" fill="#0a0a0a"/>
      <ellipse cx="88" cy="83" rx="7" ry="4" fill="#1a1a1a"/>
      <ellipse cx="112" cy="83" rx="7" ry="4" fill="#1a1a1a"/>
      <circle cx="88" cy="83" r="2" fill="#a8d8f0" opacity="0.9"/>
      <circle cx="112" cy="83" r="2" fill="#a8d8f0" opacity="0.9"/>
      <ellipse cx="100" cy="106" rx="9" ry="6" fill="#c9a84c"/>
      <rect x="58" y="75" width="8" height="14" rx="3" fill="#1a1a1a"/>
      <path d="M58,82 Q40,78 38,90 Q36,98 42,102" stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M58,85 Q42,95 44,108 Q46,118 50,120" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="100" cy="175" rx="55" ry="70" fill="#0d0d0d"/>
      <ellipse cx="100" cy="180" rx="34" ry="52" fill="#e8e8e8"/>
      <rect x="66" y="170" width="68" height="10" rx="2" fill="#1a3a1a"/>
      <rect x="95" y="166" width="10" height="18" rx="2" fill="#1a3a1a"/>
      <path d="M45,150 Q20,140 18,160 Q16,180 40,185" stroke="#0d0d0d" stroke-width="16" fill="none" stroke-linecap="round"/>
      <g transform="translate(12,175) rotate(22)">
        <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3" fill="#c9a84c" opacity="0.95"/>
        <circle cx="0" cy="0" r="3" fill="#050a10"/>
      </g>
      <path d="M155,145 Q182,135 184,158 Q186,175 162,182" stroke="#0d0d0d" stroke-width="16" fill="none" stroke-linecap="round"/>
      <ellipse cx="82" cy="242" rx="18" ry="7" fill="#c9a84c"/>
      <ellipse cx="118" cy="242" rx="18" ry="7" fill="#c9a84c"/>
    </svg>
  </div>

  <div class="main-title">PENGUINS</div>
  <div class="subtitle-rule">RULE THE WORLD</div>

  <div class="haiku">
    Silent on the ice — <span>unseen, unstoppable</span> —<br>
    the duck never knew.
  </div>

  <div class="stars-row">
    <svg class="shuriken" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <polygon points="12,2 14.5,9.5 22,12 14.5,14.5 12,22 9.5,14.5 2,12 9.5,9.5"/>
    </svg>
    <svg class="shuriken" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <polygon points="12,2 14.5,9.5 22,12 14.5,14.5 12,22 9.5,14.5 2,12 9.5,9.5"/>
    </svg>
    <svg class="shuriken" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <polygon points="12,2 14.5,9.5 22,12 14.5,14.5 12,22 9.5,14.5 2,12 9.5,9.5"/>
    </svg>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-number">&#8734;</span>
      <span class="stat-label">Stealth Level</span>
    </div>
    <div class="stat">
      <span class="stat-number">0</span>
      <span class="stat-label">Ducks Survived</span>
    </div>
    <div class="stat">
      <span class="stat-number">VII</span>
      <span class="stat-label">Continents Owned</span>
    </div>
  </div>

  <div class="divider"></div>
  <div class="motto" style="margin-top:24px;">Established Since The Ice Age &nbsp;·&nbsp; We Were Always Here</div>

</div>
</body>
</html>
